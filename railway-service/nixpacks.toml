# Railway (nixpacks) build config for the pose microservice.
#
# Adds ffmpeg to the runtime image so /trim-video can stream-copy MP4
# segments for the baseline-from-segment flow. The default nixpacks Python
# image does not include ffmpeg.
#
# libgl1 + libglib2.0-0 are required by OpenCV (pulled in transitively by
# mediapipe/ultralytics/scenedetect); without them `import cv2` fails with
# "libGL.so.1: cannot open shared object file".

[phases.setup]
aptPkgs = ["...", "ffmpeg", "libgl1", "libglib2.0-0"]
